<h2>Link mágico para acessar o ProfessorIA</h2>

<p style="font-size:15px; line-height:1.5; color:#475569;">
  Clique no botão abaixo para entrar na sua conta. O link é válido por 60 minutos.
</p>

<div style="text-align:center; margin:32px 0;">
  <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=magiclink&redirect_to=/dashboard"
     style="display:inline-block; padding:14px 32px; font-size:15px; font-weight:600; color:#fff; background:linear-gradient(135deg,#6366F1,#4F46E5); border-radius:8px; text-decoration:none;">
    Entrar no ProfessorIA
  </a>
</div>

<p style="font-size:13px; color:#94A3B8;">
  Se você não solicitou este acesso, ignore este email.
</p>

<hr style="border:none; border-top:1px solid #E2E8F0; margin:24px 0;" />

<p style="font-size:12px; color:#94A3B8;">
  ProfessorIA Classroom — Plataforma inteligente para professores da educação básica.
</p>
